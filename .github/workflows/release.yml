name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Validate production environment
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_PUBLIC_WEB_URL: ${{ secrets.VITE_PUBLIC_WEB_URL }}
        run: npm run deploy:check

      - name: Build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_PUBLIC_WEB_URL: ${{ secrets.VITE_PUBLIC_WEB_URL }}
        run: npm run build

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-dist-${{ github.sha }}
          path: dist
          if-no-files-found: error

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: quality-gates
    environment: production

    steps:
      - name: Trigger deploy hook when configured
        env:
          DEPLOY_HOOK_URL: ${{ secrets.PRODUCTION_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "PRODUCTION_DEPLOY_HOOK_URL is empty. Skipping deploy step."
            exit 0
          fi

          curl -sSf -X POST "$DEPLOY_HOOK_URL"
